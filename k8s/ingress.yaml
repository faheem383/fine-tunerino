apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gpt2-api-ingress
  namespace: gpt2-trainer-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: gpt2-api.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gpt2-api-service
            port:
              number: 80